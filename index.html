<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mid-Design Evaluation Framework</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Inter', sans-serif; font-weight: 800; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .print-break { page-break-after: always; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { 
            Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, 
            ResponsiveContainer, Tooltip: RechartsTooltip 
        } = Recharts;

        // Custom Lucide Icon Wrapper
        const Icon = ({ name, className }) => {
            const iconRef = React.useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    const LucideIcon = lucide.icons[name];
                    if (LucideIcon) {
                        const svg = lucide.createIcons({
                            icons: { [name]: LucideIcon },
                            attrs: { class: className }
                        });
                    }
                }
            }, [name, className]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        const OUTCOMES = [
          {
            id: "feasibility",
            label: "Feasibility",
            color: "#3b82f6",
            description: "“the extent to which a new treatment, or an innovation, can be successfully used or carried out within a given agency or setting.”",
            gatherPerspectives: "Gather perspectives on feasibility from key stakeholder groups:",
            stakeholders: ["Technical experts", "Future implementers", "Future users (e.g., clinicians)"],
            strategies: [
              {
                type: "message-square",
                title: "Semi-structured interview",
                topics: ["Practical capability", "Resource availability", "Training sufficiency", "Implementation burden"]
              },
              {
                type: "file-text",
                title: "Standardized Measurement Tools",
                tools: [
                  { name: "Workflow Analysis", description: "Evaluates fit within clinical processes." },
                  { name: "Feasibility of Intervention Measure (FIM)", description: "4-item assessment tool." }
                ]
              }
            ]
          },
          {
            id: "acceptability",
            label: "Acceptability",
            color: "#60a5fa",
            description: "“the perception among implementation stakeholders that a given treatment is agreeable, palatable, or satisfactory.”",
            gatherPerspectives: "Gather perspectives on acceptability from:",
            stakeholders: ["Technical experts", "Subject matter experts", "Future implementers", "Patients"],
            strategies: [
              {
                type: "message-square",
                title: "Semi-structured interview",
                topics: ["Overall satisfaction", "Emotional reactions", "Perceived comfort", "Trust and confidence"]
              },
              {
                type: "file-text",
                title: "Standardized Measurement Tools",
                tools: [
                    { name: "Acceptability of Intervention Measure (AIM)", description: "Captures how satisfactory stakeholders find the intervention." }
                ]
              }
            ]
          },
          {
            id: "appropriateness",
            label: "Appropriateness",
            color: "#93c5fd",
            description: "“the perceived fit, relevance, or compatibility of the innovation for a given practice setting.”",
            gatherPerspectives: "Gather perspectives on appropriateness from:",
            stakeholders: ["Subject matter experts", "Future implementers", "Future users"],
            strategies: [
              {
                type: "message-square",
                title: "Semi-structured interview",
                topics: ["Relevance to clinical problem", "Compatibility with missions", "Fit within models"]
              }
            ]
          },
          {
            id: "adoption",
            label: "Adoption",
            color: "#bfdbfe",
            description: "“the intention, initial decision, or action to try or employ an innovation.”",
            gatherPerspectives: "Gather perspectives on expected adoption from:",
            stakeholders: ["Future users", "Decision-makers", "Financial officers"],
            strategies: [
              {
                type: "message-square",
                title: "Semi-structured interview",
                topics: ["Relative advantage", "Complexity", "Organizational readiness"]
              }
            ]
          },
          {
            id: "cost",
            label: "Implementation Cost",
            color: "#1e3a8a",
            description: "“the cost impact of an implementation effort... depends upon the particular intervention and strategy used.”",
            gatherPerspectives: "Gather perspectives on anticipated implementation cost from:",
            stakeholders: ["Organizational leaders", "Front-line users", "Policy stakeholders"],
            strategies: [
              {
                type: "search",
                title: "Economic Framework",
                topics: ["Analytic perspective", "Operational data", "Cost drivers"]
              }
            ]
          },
          {
            id: "fidelity",
            label: "Fidelity",
            color: "#1e40af",
            description: "“the degree to which an intervention was implemented as it was prescribed in the original protocol.”",
            gatherPerspectives: "Gather perspectives on anticipated fidelity from:",
            stakeholders: ["Senior leadership", "Managers", "Front-line users"],
            strategies: [
              {
                type: "eye",
                title: "Field Observation",
                tools: [{ name: "FIMP", description: "Observation-based measure of adherence." }]
              }
            ]
          },
          {
            id: "penetration",
            label: "Penetration",
            color: "#1e3a8a",
            description: "“the integration of a practice within a service setting and its subsystems.”",
            gatherPerspectives: "Gather perspectives on anticipated penetration from:",
            stakeholders: ["Clinical leadership", "Infrastructure personnel"],
            strategies: [
              {
                type: "file-text",
                title: "Normalization Process Theory",
                tools: [{ name: "NoMAD", description: "Measuring implementation work." }]
              }
            ]
          },
          {
            id: "sustainability",
            label: "Sustainability",
            color: "#172554",
            description: "“the extent to which a newly implemented treatment is maintained or institutionalized.”",
            gatherPerspectives: "Gather perspectives on anticipated sustainability from:",
            stakeholders: ["Senior leadership", "Financial managers", "Front-line users"],
            strategies: [
              {
                type: "search",
                title: "Policy and Workflow Audit",
                tools: [{ name: "PRISM", description: "Sustainability infrastructure assessment." }]
              }
            ]
          }
        ];

        function App() {
          const [scores, setScores] = useState({
            feasibility: 3, acceptability: 3, appropriateness: 3, adoption: 3,
            cost: 3, fidelity: 3, penetration: 3, sustainability: 3
          });
          const [notes, setNotes] = useState({});
          const [expandedId, setExpandedId] = useState(null);

          const chartData = useMemo(() => {
            return OUTCOMES.map((o) => ({
              subject: o.label,
              A: scores[o.id],
              fullMark: 5,
            }));
          }, [scores]);

          const handleScoreChange = (id, val) => setScores((p) => ({ ...p, [id]: parseInt(val) }));
          const handleNoteChange = (id, val) => setNotes((p) => ({ ...p, [id]: val }));
          const toggleExpand = (id) => setExpandedId(expandedId === id ? null : id);

          const getInterpretation = () => {
            const avg = Object.values(scores).reduce((a, b) => a + b, 0) / 8;
            if (avg >= 4.5) return { 
                text: "Strong readiness for implementation.", 
                color: "text-green-600", bg: "bg-green-50", 
                border: "border-green-200", icon: "check-circle-2" 
            };
            if (avg >= 3) return { 
                text: "Moderate readiness; minor refinements suggested.", 
                color: "text-blue-600", bg: "bg-blue-50", 
                border: "border-blue-200", icon: "info" 
            };
            return { 
                text: "Significant barriers identified; proactive design iteration recommended.", 
                color: "text-amber-600", bg: "bg-amber-50", 
                border: "border-amber-200", icon: "alert-circle" 
            };
          };

          const interpretation = getInterpretation();

          return (
            <div className="min-h-screen bg-[#F8FAFC] text-slate-900 p-4 md:p-8">
              <div className="max-w-7xl mx-auto">
                <header className="mb-10 border-b border-slate-200 pb-8">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                    <div>
                      <h1 className="text-4xl font-extrabold tracking-tight text-slate-900 mb-2 font-display">
                        Mid-Design Evaluation Framework
                      </h1>
                      <p className="text-slate-500 max-w-4xl text-base italic leading-relaxed">
                        A structured decision-support tool to proactively assess implementation outcomes and refine medical innovations before full-scale rollout. <br/>
                        <span className="font-semibold text-slate-400">@Chuwen Zheng</span>
                      </p>
                    </div>
                    <button 
                      onClick={() => window.print()}
                      className="no-print flex items-center gap-2 bg-white border border-slate-300 px-5 py-2.5 rounded-xl hover:bg-slate-50 transition shadow-sm text-sm font-semibold text-slate-700"
                    >
                      <Icon name="download" className="w-4 h-4" /> Export Report
                    </button>
                  </div>
                </header>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                  <div className="lg:col-span-7 space-y-10">
                    <section>
                      <div className="flex items-center justify-between mb-6">
                        <div className="flex items-center gap-3">
                          <div className="p-2 bg-blue-100 rounded-lg">
                            <Icon name="book-open" className="w-5 h-5 text-blue-600" />
                          </div>
                          <h2 className="text-2xl font-bold text-slate-800">Outcome Details & Strategies</h2>
                        </div>
                      </div>

                      <div className="space-y-4">
                        {OUTCOMES.map((o) => (
                          <div key={o.id} className={`bg-white rounded-2xl border transition-all duration-300 ${expandedId === o.id ? "shadow-xl border-blue-200" : "shadow-sm border-slate-200"}`}>
                            <button onClick={() => toggleExpand(o.id)} className="w-full text-left p-5 flex items-center justify-between group">
                              <div className="flex items-center gap-4">
                                <div className="w-3 h-3 rounded-full" style={{ backgroundColor: o.color }} />
                                <h3 className="text-lg font-bold text-slate-800">{o.label}</h3>
                              </div>
                              <Icon name={expandedId === o.id ? "chevron-up" : "chevron-down"} className="w-5 h-5 text-slate-400" />
                            </button>

                            {expandedId === o.id && (
                              <div className="px-6 pb-6 pt-2">
                                <div className="h-px bg-slate-100 mb-6" />
                                <div className="space-y-6">
                                  <div>
                                    <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Definition</h4>
                                    <p className="text-slate-700 italic border-l-4 border-blue-100 pl-4 py-1 bg-blue-50/30 rounded-r-lg">{o.description}</p>
                                  </div>
                                  <div>
                                    <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Stakeholders</h4>
                                    <ul className="grid grid-cols-2 gap-2">
                                      {o.stakeholders.map((s, i) => (
                                        <li key={i} className="text-sm text-slate-600 flex items-center gap-2">
                                          <div className="w-1 h-1 rounded-full bg-blue-400" /> {s}
                                        </li>
                                      ))}
                                    </ul>
                                  </div>
                                  <div className="grid grid-cols-1 gap-4">
                                    {o.strategies.map((strat, idx) => (
                                      <div key={idx} className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <div className="flex items-center gap-2 mb-3">
                                          <Icon name={strat.type} className="w-4 h-4 text-blue-500" />
                                          <span className="text-sm font-bold uppercase">{strat.title}</span>
                                        </div>
                                        {strat.topics && (
                                          <ul className="text-xs text-slate-500 grid grid-cols-2 gap-1">
                                            {strat.topics.map((t, i) => <li key={i}>• {t}</li>)}
                                          </ul>
                                        )}
                                        {strat.tools && (
                                          <div className="space-y-2 mt-2">
                                            {strat.tools.map((t, i) => (
                                              <div key={i} className="bg-white p-2 rounded border border-slate-200">
                                                <div className="text-xs font-bold">{t.name}</div>
                                                <div className="text-[10px] text-slate-400">{t.description}</div>
                                              </div>
                                            ))}
                                          </div>
                                        )}
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </section>

                    <section className="no-print">
                      <div className="flex items-center gap-3 mb-6">
                        <div className="p-2 bg-slate-800 rounded-lg text-white">
                          <Icon name="clipboard-check" className="w-5 h-5" />
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800">Interactive Readiness Table</h2>
                      </div>
                      <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <table className="w-full text-left">
                          <thead className="bg-slate-50 text-[10px] font-black uppercase tracking-widest text-slate-400">
                            <tr>
                              <th className="px-6 py-4">Criterion</th>
                              <th className="px-6 py-4">Score (1-5)</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {OUTCOMES.map(outcome => (
                              <tr key={outcome.id}>
                                <td className="px-6 py-4 font-bold text-slate-700">{outcome.label}</td>
                                <td className="px-6 py-4">
                                  <div className="flex gap-1">
                                    {[1,2,3,4,5].map(v => (
                                      <button 
                                        key={v}
                                        onClick={() => handleScoreChange(outcome.id, v)}
                                        className={`w-8 h-8 rounded-lg text-xs font-bold transition-all ${scores[outcome.id] === v ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-400 hover:bg-slate-200"}`}
                                      >
                                        {v}
                                      </button>
                                    ))}
                                  </div>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </section>
                  </div>

                  <div className="lg:col-span-5">
                    <div className="bg-white rounded-[2rem] shadow-2xl border border-slate-200 p-8 sticky top-8">
                      <h2 className="text-xl font-black uppercase tracking-tight text-slate-800 mb-6">Readiness Matrix</h2>
                      <div className="w-full h-[360px] mb-8 bg-slate-50/50 rounded-2xl p-4 border border-slate-100">
                        <ResponsiveContainer width="100%" height="100%">
                          <RadarChart cx="50%" cy="50%" outerRadius="80%" data={chartData}>
                            <PolarGrid stroke="#E2E8F0" />
                            <PolarAngleAxis dataKey="subject" tick={{ fill: "#64748B", fontSize: 10, fontWeight: 800 }} />
                            <PolarRadiusAxis angle={30} domain={[0, 5]} tick={false} stroke="none" />
                            <Radar name="Score" dataKey="A" stroke="#1D4ED8" strokeWidth={3} fill="#3B82F6" fillOpacity={0.5} />
                            <RechartsTooltip />
                          </RadarChart>
                        </ResponsiveContainer>
                      </div>

                      <div className={`p-6 rounded-2xl border ${interpretation.bg} ${interpretation.border}`}>
                        <div className="flex items-center gap-3 mb-2">
                           <Icon name={interpretation.icon} className={`w-5 h-5 ${interpretation.color}`} />
                           <h4 className={`font-bold text-sm uppercase ${interpretation.color}`}>Evaluation Insight</h4>
                        </div>
                        <p className={`text-sm font-medium ${interpretation.color}`}>{interpretation.text}</p>
                      </div>

                      <div className="mt-8 space-y-4">
                         <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest">General Notes</h4>
                         <textarea 
                            className="w-full h-32 bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-100"
                            placeholder="Add overall design refinement observations..."
                         ></textarea>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
