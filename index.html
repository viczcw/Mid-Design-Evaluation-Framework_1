<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mid-Design Evaluation Framework</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Recharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.0/Recharts.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            .bg-[#F8FAFC] { background-color: white !important; }
        }
        /* Ensure the chart container has visibility */
        .recharts-responsive-container {
            min-height: 300px;
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // Correctly destructure from the global Recharts object
        const { 
            Radar, RadarChart, PolarGrid, PolarAngleAxis, 
            PolarRadiusAxis, ResponsiveContainer, Tooltip: RechartsTooltip 
        } = window.Recharts;

        // Custom Lucide Icon Component with safer initialization
        const Icon = ({ name, className = "w-4 h-4" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const OUTCOMES = [
            {
                id: "feasibility",
                label: "Feasibility",
                color: "#3b82f6",
                description: "“the extent to which a new treatment, or an innovation, can be successfully used or carried out within a given agency or setting.”",
                stakeholders: ["Technical experts", "Future implementers", "Future users"],
                strategies: [
                    {
                        type: "interview",
                        title: "Semi-structured interview",
                        topics: ["Practical capability", "Resource availability", "Training sufficiency"]
                    },
                    {
                        type: "survey",
                        title: "Measurement Tools",
                        tools: [{ name: "FIM", description: "Feasibility of Intervention Measure." }]
                    }
                ]
            },
            {
                id: "acceptability",
                label: "Acceptability",
                color: "#60a5fa",
                description: "“the perception that a given treatment or innovation is agreeable, palatable, or satisfactory.”",
                stakeholders: ["SMEs", "Future users", "Beneficiaries"],
                strategies: [
                    {
                        type: "interview",
                        title: "Satisfaction Deep-dive",
                        topics: ["Emotional reactions", "Perceived comfort"]
                    },
                    {
                        type: "survey",
                        title: "Measurement Tools",
                        tools: [{ name: "AIM", description: "Acceptability of Intervention Measure." }]
                    }
                ]
            },
            {
                id: "appropriateness",
                label: "Appropriateness",
                color: "#93c5fd",
                description: "“the perceived fit, relevance, or compatibility of the innovation for a given practice setting.”",
                stakeholders: ["Subject matter experts", "Future users"],
                strategies: [
                    {
                        type: "interview",
                        title: "Fit Assessment",
                        topics: ["Relevance to problem", "Compatibility with mission"]
                    },
                    {
                        type: "survey",
                        title: "Measurement Tools",
                        tools: [{ name: "IAM", description: "Intervention Appropriateness Measure." }]
                    }
                ]
            },
            {
                id: "adoption",
                label: "Adoption",
                color: "#bfdbfe",
                description: "“the intention, initial decision, or action to try or employ an innovation.”",
                stakeholders: ["Future users", "Decision-makers"],
                strategies: [
                    {
                        type: "interview",
                        title: "Decision Drivers",
                        topics: ["Relative advantage", "Complexity burden"]
                    }
                ]
            },
            {
                id: "cost",
                label: "Implementation Cost",
                color: "#1e3a8a",
                description: "“the cost impact of an implementation effort... depends upon the intervention and location.”",
                stakeholders: ["Management", "Financial stakeholders"],
                strategies: [
                    {
                        type: "review",
                        title: "Financial Review",
                        tools: [{ name: "Budget Audit", description: "Analysis of operational overhead." }]
                    }
                ]
            },
            {
                id: "fidelity",
                label: "Fidelity",
                color: "#1e40af",
                description: "“the degree to which an intervention was implemented as prescribed in the original protocol.”",
                stakeholders: ["Leadership", "Operational managers"],
                strategies: [
                    {
                        type: "observation",
                        title: "Field Observation",
                        tools: [{ name: "FIMP System", description: "Measuring competent adherence." }]
                    }
                ]
            },
            {
                id: "penetration",
                label: "Penetration",
                color: "#1e3a8a",
                description: "“the integration of a practice within a service setting and its subsystems.”",
                stakeholders: ["Mid-level managers", "Clinical leadership"],
                strategies: [
                    {
                        type: "survey",
                        title: "NPT Assessment",
                        tools: [{ name: "NoMAD", description: "Normalization Process Theory tool." }]
                    }
                ]
            },
            {
                id: "sustainability",
                label: "Sustainability",
                color: "#172554",
                description: "“the extent to which a newly implemented treatment is maintained within ongoing operations.”",
                stakeholders: ["Senior leadership", "Financial decision-makers"],
                strategies: [
                    {
                        type: "review",
                        title: "Policy Audit",
                        tools: [{ name: "SOP Review", description: "Integration into standard workflows." }]
                    }
                ]
            }
        ];

        function App() {
            const [scores, setScores] = useState({
                feasibility: 3, acceptability: 3, appropriateness: 3, adoption: 3,
                cost: 3, fidelity: 3, penetration: 3, sustainability: 3,
            });
            const [notes, setNotes] = useState({});
            const [expandedId, setExpandedId] = useState("feasibility"); // Default open for UX

            const chartData = useMemo(() => {
                return OUTCOMES.map((o) => ({
                    subject: o.label,
                    A: scores[o.id] || 0,
                    fullMark: 5,
                }));
            }, [scores]);

            const handleScoreChange = (id, val) => setScores(p => ({ ...p, [id]: parseInt(val) }));
            const handleNoteChange = (id, val) => setNotes(p => ({ ...p, [id]: val }));
            const toggleExpand = (id) => setExpandedId(expandedId === id ? null : id);

            const getInterpretation = () => {
                const values = Object.values(scores);
                const avg = values.reduce((a, b) => a + b, 0) / values.length;
                if (avg >= 4.2) return { text: "Strong readiness for implementation.", color: "text-green-600", bg: "bg-green-50", border: "border-green-200", icon: "check-circle-2" };
                if (avg >= 3) return { text: "Moderate readiness; minor refinements suggested.", color: "text-blue-600", bg: "bg-blue-50", border: "border-blue-200", icon: "info" };
                return { text: "Significant barriers identified; proactive design iteration recommended.", color: "text-amber-600", bg: "bg-amber-50", border: "border-amber-200", icon: "alert-circle" };
            };

            const interp = getInterpretation();

            return (
                <div className="min-h-screen p-4 md:p-8 text-slate-900">
                    <div className="max-w-7xl mx-auto">
                        <header className="mb-10 border-b border-slate-200 pb-8 no-print">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                <div>
                                    <h1 className="text-4xl font-black tracking-tight text-slate-900 mb-2">Mid-Design Evaluation Framework</h1>
                                    <p className="text-slate-500 max-w-2xl text-base">
                                        Implementation science outcomes adapted for proactive medical design refinement.
                                        <br/><span className="text-xs font-bold text-slate-400">AUTHOR: CHUWEN ZHENG</span>
                                    </p>
                                </div>
                                <button onClick={() => window.print()} className="flex items-center gap-2 bg-white border border-slate-200 px-5 py-2.5 rounded-xl hover:bg-slate-50 transition shadow-sm text-sm font-bold">
                                    <Icon name="printer" /> Print Report
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            {/* Left: Interactive Details */}
                            <div className="lg:col-span-7 space-y-8">
                                <section className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="p-2 bg-blue-600 rounded-lg text-white"><Icon name="settings" /></div>
                                        <h2 className="text-xl font-bold">Outcome Scoring & Evidence</h2>
                                    </div>
                                    <div className="space-y-3">
                                        {OUTCOMES.map((o) => (
                                            <div key={o.id} className={`rounded-2xl border transition-all ${expandedId === o.id ? "border-blue-200 bg-blue-50/20" : "border-slate-100 bg-white"}`}>
                                                <div className="p-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                                    <div className="flex items-center gap-4 flex-1">
                                                        <button onClick={() => toggleExpand(o.id)} className="font-bold text-slate-800 hover:text-blue-600 flex items-center gap-2">
                                                            <div className="w-2 h-2 rounded-full" style={{backgroundColor: o.color}} />
                                                            {o.label}
                                                        </button>
                                                        <div className="flex gap-1">
                                                            {[1, 2, 3, 4, 5].map(v => (
                                                                <button 
                                                                    key={v} 
                                                                    onClick={() => handleScoreChange(o.id, v)}
                                                                    className={`w-7 h-7 rounded-md text-[10px] font-black transition-all ${scores[o.id] === v ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-400 hover:bg-slate-200"}`}
                                                                >
                                                                    {v}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <input 
                                                        type="text" 
                                                        placeholder="Add observation note..."
                                                        className="bg-transparent border-b border-slate-200 px-2 py-1 text-xs focus:border-blue-500 outline-none w-full md:w-48"
                                                        value={notes[o.id] || ""}
                                                        onChange={(e) => handleNoteChange(o.id, e.target.value)}
                                                    />
                                                </div>
                                                {expandedId === o.id && (
                                                    <div className="px-4 pb-4 pt-2 text-sm text-slate-600">
                                                        <div className="bg-white rounded-xl p-4 border border-blue-50 shadow-inner">
                                                            <p className="italic mb-4 text-slate-500">"{o.description}"</p>
                                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                                <div>
                                                                    <p className="text-[10px] font-black uppercase text-slate-400 mb-2">Stakeholders</p>
                                                                    <ul className="space-y-1">
                                                                        {o.stakeholders.map((s, i) => <li key={i} className="flex items-center gap-2 text-xs"><div className="w-1 h-1 bg-blue-300 rounded-full"/>{s}</li>)}
                                                                    </ul>
                                                                </div>
                                                                <div>
                                                                    <p className="text-[10px] font-black uppercase text-slate-400 mb-2">Eval Strategies</p>
                                                                    {o.strategies.map((s, i) => (
                                                                        <div key={i} className="mb-2">
                                                                            <p className="text-xs font-bold text-slate-800">{s.title}</p>
                                                                            {s.tools && s.tools.map((t, j) => <p key={j} className="text-[10px] text-blue-500">{t.name}</p>)}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>

                            {/* Right: Visualization */}
                            <div className="lg:col-span-5">
                                <div className="sticky top-4 space-y-6">
                                    <div className="bg-white rounded-[2rem] shadow-xl border border-slate-200 p-8">
                                        <h3 className="text-lg font-bold mb-6 flex items-center justify-between">
                                            Readiness Matrix
                                            <Icon name="radar" className="text-blue-600" />
                                        </h3>
                                        
                                        <div className="w-full h-[320px]">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <RadarChart cx="50%" cy="50%" outerRadius="80%" data={chartData}>
                                                    <PolarGrid stroke="#f1f5f9" />
                                                    <PolarAngleAxis dataKey="subject" tick={{ fill: "#94a3b8", fontSize: 10, fontWeight: 700 }} />
                                                    <PolarRadiusAxis angle={30} domain={[0, 5]} tick={false} axisLine={false} />
                                                    <Radar 
                                                        name="Readiness" 
                                                        dataKey="A" 
                                                        stroke="#2563eb" 
                                                        strokeWidth={2} 
                                                        fill="#3b82f6" 
                                                        fillOpacity={0.6} 
                                                    />
                                                </RadarChart>
                                            </ResponsiveContainer>
                                        </div>

                                        <div className="mt-8 pt-8 border-t border-slate-100">
                                            <div className={`${interp.bg} ${interp.border} ${interp.color} p-4 rounded-2xl flex items-start gap-3`}>
                                                <Icon name={interp.icon} className="mt-1" />
                                                <p className="text-sm font-bold leading-tight">{interp.text}</p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4 mt-6">
                                            <div className="bg-slate-50 p-4 rounded-2xl text-center">
                                                <span className="text-[10px] font-black text-slate-400 uppercase">Avg Score</span>
                                                <div className="text-2xl font-black text-slate-800">
                                                    {(Object.values(scores).reduce((a, b) => a + b, 0) / 8).toFixed(1)}
                                                </div>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-2xl text-center">
                                                <span className="text-[10px] font-black text-slate-400 uppercase">Status</span>
                                                <div className="text-xs font-bold text-blue-600 mt-1 uppercase">Analysis Live</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Wait for DOM to be ready
        window.addEventListener('load', () => {
            const container = document.getElementById('root');
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        });
    </script>
</body>
</html>
